services:
  - type: web
    name: pl-intelligence-backend
    runtime: python
    region: ohio
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ODDS_API_KEY
        sync: false
      - key: FOOTBALL_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OFFLINE_MODE
        value: "1"
      - key: FRONTEND_URL
        sync: false
